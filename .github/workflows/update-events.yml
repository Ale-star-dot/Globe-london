name: Update Events Daily

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape events
        run: python run.py --dry-run
        env:
          PYTHONUNBUFFERED: '1'
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}

      - name: Validate output
        run: |
          if [ ! -f output/events-data.js ]; then
            echo "ERROR: output/events-data.js not found"
            exit 1
          fi
          EVENT_COUNT=$(grep -c 'title' output/events-data.js || true)
          echo "Events scraped: $EVENT_COUNT"
          if [ "$EVENT_COUNT" -lt 5 ]; then
            echo "ERROR: Only $EVENT_COUNT events — aborting"
            exit 1
          fi
          echo "OK — $EVENT_COUNT events"

      - name: Copy output to site root
        run: cp output/events-data.js events-data.js

      - name: Commit and push
        run: |
          git config user.name  "Globe Bot"
          git config user.email "bot@globeartorg.com"
          git add events-data.js
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Daily events update"
            git push
          fi
